# GitHub Actions: Release
#
# Triggers on tag push matching 'v*' (e.g., v1.5.0)
# Builds the extension, creates a ZIP, and publishes a GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create extension ZIP
        run: |
          zip -r sheets-tab-manager-${{ steps.version.outputs.VERSION }}.zip \
            manifest.json \
            service-worker-loader.js \
            assets/ \
            src/sidepanel/index.html \
            src/icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sheets-tab-manager-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
